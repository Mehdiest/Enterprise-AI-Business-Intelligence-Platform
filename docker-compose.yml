services:

  postgres:

    image: postgres:16

    container_name: ai-bi-postgres

    restart: unless-stopped

    env_file:
      - .env.docker

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: ai-bi-api

    restart: unless-stopped

    depends_on:

      postgres:
        condition: service_healthy

    env_file:
      - .env.docker

    ports:
      - "8000:8000"

    volumes:
      - .:/app

volumes:

  postgres_data: